services:
  - type: web
    name: ghs-entrance-exam-api
    env: node
    plan: free
    buildCommand: node build.js
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://ghs-entrance-exam-app.netlify.app
 